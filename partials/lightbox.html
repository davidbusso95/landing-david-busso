  <!-- Modal / Lightbox para capturas -->
  <div
    class="lightbox"
    id="caseLightbox"
    aria-label="Vista ampliada de captura"
    role="dialog"
    aria-modal="true"
  >
    <div class="lightbox-content">
      <button class="lightbox-close" type="button" aria-label="Cerrar vista ampliada">
        &times;
      </button>

      <img id="lightboxImage" src="" alt="" />
    </div>
  </div>
